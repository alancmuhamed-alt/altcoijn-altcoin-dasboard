name: Update Crypto Dashboard

on:
  # Her 15 dakikada bir çalış
  schedule:
    - cron: '*/15 * * * *'

  # Manuel tetikleme
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update dashboard
        run: |
          python update_website.py

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git config pull.rebase false
          git add *.html *.json

          # Check if there are changes
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update dashboard - $(TZ=Asia/Dubai date '+%Y-%m-%d %H:%M:%S') Dubai"

            # Pull with conflict resolution (keep ours = newest data)
            git pull --no-edit -X ours || true

            # If conflicts still exist, resolve by taking our version
            if [ -n "$(git ls-files -u)" ]; then
              git checkout --ours *.html *.json
              git add *.html *.json
              git commit -m "🤖 Resolve conflicts - keep latest data"
            fi

            git push
          fi

      - name: Deploy to GitHub Pages
        run: |
          echo "✅ Files updated and pushed to main branch"
          echo "🌐 GitHub Pages will auto-deploy in ~1 minute"
