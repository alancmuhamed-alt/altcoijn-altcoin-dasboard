name: Update Crypto Dashboard

on:
  schedule:
    # Her 15 dakikada bir çalışır (UTC zamanı)
    - cron: '*/15 * * * *'

  # Manuel tetikleme için
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update dashboards
        run: |
          python update_dashboards.py

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        run: |
          git add *.html risk_metrics.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update dashboard - $(TZ='Asia/Dubai' date +'%Y-%m-%d %H:%M:%S') Dubai Time"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
